# ══════════════════════════════════════════════
#  hypridle.conf — achiri
#  Documentación: https://wiki.hypr.land/Hypr-Ecosystem/hypridle/
# ══════════════════════════════════════════════

general {
    # Evita instancias duplicadas de hyprlock (CRÍTICO)
    lock_cmd   = pidof hyprlock || hyprlock

    # Esto garantiza que el lock se active desde cualquier origen
    unlock_cmd = killall -s SIGUSR1 hyprlock 2>/dev/null || true

    # Bloquear ANTES de suspender — elimina la ventana de seguridad al despertar
    before_sleep_cmd = loginctl lock-session

    # Encender pantalla al volver de suspend (DPMS puede quedar apagado)
    after_sleep_cmd  = hyprctl dispatch dpms on

    # Respetar inhibidores D-Bus (Firefox fullscreen, Steam, VLC, etc.)
    # false = los respeta (comportamiento correcto por defecto)
    ignore_dbus_inhibit   = false
    ignore_systemd_inhibit = false
}

# ── 1. Advertencia temprana (4:00 min) ─────────
# Notificación no intrusiva antes de bloquear
# Requiere: libnotify + un daemon activo (mako, dunst, swaync)
listener {
    timeout  = 240
    on-timeout = notify-send -u low -t 8000 \
        "󰌾 Inactividad detectada" \
        "La pantalla se bloqueará en 1 minuto."
}

# ── 2. Bloqueo de pantalla (5:00 min) ──────────
# Usar loginctl lock-session en lugar de hyprlock directamente:
# esto dispara lock_cmd de general{} correctamente y respeta el
# flujo D-Bus (hipridle → logind → hyprlock)
listener {
    timeout  = 300
    on-timeout = loginctl lock-session
}

# ── 3. Apagar pantalla / DPMS (8:00 min) ───────
# Solo apaga la pantalla, no suspende — ideal si hay procesos activos
listener {
    timeout   = 480
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

# ── 4. Suspender sistema (15:00 min) ───────────
listener {
    timeout  = 900
    on-timeout = systemctl suspend
}