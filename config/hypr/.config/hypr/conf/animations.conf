##################
### ANIMATIONS ###
##################

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes

    # ───────── BEZIERS ─────────
    bezier = smooth, 0.5, 0.5, 0.4, 1.1
    bezier = easeOut, 0.23, 1, 0.32, 1
    bezier = easeInOut, 0.65, 0.05, 0.36, 1
    bezier = snappy, 0.15, 0, 0.1, 1
    bezier = easeOutQuint, 0.23, 1, 0.32, 1

    # ───────── WINDOWS ─────────
    animation = windows, 1, 5, easeOut, popin 85%
    animation = windowsIn, 1, 4, easeOut, popin 85%
    animation = windowsOut, 1, 1.4, easeOutQuint, popin 70%

    # ───────── FADES ─────────
    animation = fade, 1, 2.5, easeOut
    animation = fadeIn, 1, 1.8, easeOut
    animation = fadeOut, 1, 1.2, easeOut

    # ───────── LAYERS (bar, notifications) ─────────
    animation = layers, 1, 3, easeOut, fade

    # ───────── WORKSPACES ─────────
    animation = workspaces, 1, 2.2, smooth
}