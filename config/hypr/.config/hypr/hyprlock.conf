# ══════════════════════════════════════════════
#  hyprlock.conf — achiridev
#  Documentación: https://wiki.hypr.land/Hypr-Ecosystem/hyprlock/
# ══════════════════════════════════════════════

# ── General ────────────────────────────────────
general {
    hide_cursor        = true
    ignore_empty_input = true
    text_trim          = true
    fractional_scaling = 2
}

# ── Autenticación ───────────────────────────────
auth {
    pam {
        enabled = true
        module  = hyprlock
    }
}

# ── Animaciones ─────────────────────────────────
animations {
    enabled = true
}

bezier = smoothOut,  0.36, 0, 0.66, -0.56
bezier = smoothIn,   0.25, 1, 0.5,  1
bezier = linear,     0.0,  0, 1.0,  1

animation = fadeIn,            1, 8,  smoothIn
animation = fadeOut,           1, 8,  smoothOut
animation = inputFieldColors,  1, 6,  smoothIn
animation = inputFieldFade,    1, 6,  smoothIn
animation = inputFieldDots,    1, 6,  smoothIn

# ══════════════════════════════════════════════
#  WIDGETS
# ══════════════════════════════════════════════

# ── Background ─────────────────────────────────
background {
    monitor    =
    path       = /home/achiri/Imágenes/wallpapers/CotN-night2.jpeg

    blur_passes      = 0
    blur_size        = 7
    noise            = 0.0117
    contrast         = 0.8917
    brightness       = 0.8000   # ligeramente oscuro para mejor contraste
    vibrancy         = 0.1686
    vibrancy_darkness = 0.05
}

# ── Avatar / Imagen de perfil ───────────────────
image {
    monitor  =
    path     = /home/achiri/.config/hypr/extras/cocodrilo_fuego.jpeg
    size     = 100
    rounding = -1              # círculo perfecto
    border_size  = 3
    border_color = rgba(0, 0, 0, 0.6)
    position = 0, 180
    halign   = center
    valign   = center
    zindex   = 1
}

# ── Hora ────────────────────────────────────────
label {
    monitor     =
    text        = $TIME
    font_size   = 90
    font_family = JetBrains Mono Nerd Font Bold
    color       = rgba(255, 255, 255, 0.95)

    shadow_passes = 3
    shadow_size   = 8
    shadow_color  = rgba(0, 0, 0, 0.5)
    shadow_boost  = 1.4

    position  = 0, 80
    halign    = center
    valign    = center
    zindex    = 1
}

# ── Fecha ───────────────────────────────────────
label {
    monitor     =
    # Ejemplo: "Jueves, 12 de Marzo"
    text        = cmd[update:60000] date '+%A, %-d de %B'
    font_size   = 22
    font_family = JetBrains Mono Nerd Font
    color       = rgba(255, 255, 255, 0.75)

    shadow_passes = 2
    shadow_size   = 4
    shadow_color  = rgba(0, 0, 0, 0.4)
    shadow_boost  = 1.2

    position  = 0, 10
    halign    = center
    valign    = center
    zindex    = 1
}

# ── Usuario ─────────────────────────────────────
label {
    monitor     =
    text        = 󰀄  $USER
    font_size   = 18
    font_family = JetBrains Mono Nerd Font
    color       = rgba(255, 255, 255, 0.70)

    shadow_passes = 1
    shadow_size   = 3
    shadow_color  = rgba(0, 0, 0, 0.4)

    position  = 0, -60
    halign    = center
    valign    = center
    zindex    = 1
}

# ── Input Field ─────────────────────────────────
input-field {
    monitor  =
    size     = 320, 55
    rounding = 12

    outline_thickness = 2

    # Colores por estado
    outer_color   = rgba(255, 255, 255, 0.2)
    inner_color   = rgba(0, 0, 0, 0.45)
    font_color    = rgba(255, 255, 255, 0.95)
    font_family   = JetBrains Mono Nerd Font

    # Estado al verificar contraseña
    check_color   = rgba(100, 220, 160, 0.9)

    # Estado de fallo
    fail_color    = rgba(220, 80, 80, 0.9)
    fail_text     = <i>$FAIL ($ATTEMPTS)</i>

    # Caps Lock activado
    capslock_color = rgba(250, 190, 70, 0.9)

    # Dots (caracteres ingresados)
    dots_size     = 0.28
    dots_spacing  = 0.35
    dots_center   = true
    dots_rounding = -1          # dots circulares

    # Placeholder
    placeholder_text = <i>Contraseña</i>
    hide_input       = false
    fade_on_empty    = true
    fade_timeout     = 1500

    # Swap font color al verificar (blanco→negro sobre fondo claro)
    swap_font_color  = false

    shadow_passes = 2
    shadow_size   = 6
    shadow_color  = rgba(0, 0, 0, 0.4)
    shadow_boost  = 1.2

    position  = 0, -120
    halign    = center
    valign    = center
    zindex    = 2
}
