# https://wiki.hypr.land/Configuring/Monitors/
monitor=,preferred,auto,1

### COLORS ###
source = ~/.config/hypr/conf/colors.conf

### MIS PROGRAMAS ###
source = ~/.config/hypr/conf/apps.conf

### AUTOSTART ###
source = ~/.config/hypr/conf/autostart.conf

### ENVIRONMENT VARIABLES ###
source = ~/.config/hypr/conf/env.conf

### LOOK AND FEEL ###
source = ~/.config/hypr/conf/look.conf

### ANIMATIONS ###
source = ~/.config/hypr/conf/animations.conf

### INPUT ###
source = ~/.config/hypr/conf/input.conf

### DEVICES ###
source = ~/.config/hypr/conf/devices.conf

### KEYBINDINGS ###
source = ~/.config/hypr/conf/binds.conf

### WINDOW RULES ###
source = ~/.config/hypr/conf/windowrules.conf

### PLUGINS ###
source = ~/.config/hypr/conf/plugin.conf

###################
### PERMISSIONS ###
###################

